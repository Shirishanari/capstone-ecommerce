name: Maven Build & Selenium Tests

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Google Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      - name: Install matching ChromeDriver
        uses: actions/setup-chromedriver@v2
        with:
          chrome-version: 'latest'   # v2 automatically detects installed Chrome version

      - name: Start frontend app
        run: |
          nohup npm start > frontend.log 2>&1 &
          echo "Waiting for frontend to start on port 3000..."
          n=0
          until $(curl --output /dev/null --silent --head --fail http://localhost:3000); do
            n=$((n+1))
            if [ $n -ge 30 ]; then
              echo "Frontend did not start in time!"
              cat frontend.log
              exit 1
            fi
            sleep 2
          done
          echo "Frontend is up!"

      - name: Build Maven project
        run: mvn clean install -DskipTests

      - name: Run Selenium Tests (Headless Chrome)
        run: mvn test
        env:
          CHROME_OPTS: "--headless --no-sandbox --disable-dev-shm-usage"