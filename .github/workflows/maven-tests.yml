name: Maven Build & Selenium Tests

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Google Chrome
      run: |
        sudo apt update
        sudo apt install -y google-chrome-stable

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Seed database
      env:
        MONGODB_URI: mongodb://localhost:27017/ecommerce
      run: |
        # populate products and default user
        npm --prefix backend run seed
        # create test user via API (ignore errors if already exists)
        curl -s -X POST http://localhost:5000/api/auth/register \
          -H "Content-Type: application/json" \
          -d '{"name":"Test User","email":"testuser@gmail.com","password":"password123"}' || true

    - name: Start backend and frontend servers
      env:
        MONGODB_URI: mongodb://localhost:27017/ecommerce
      run: |
        # launch backend and frontend using explicit prefixes so path doesn't matter
        npm --prefix backend start &
        npm --prefix frontend start &

        # wait for backend to accept connections
        echo "Waiting for backend on port 5000..."
        for i in {1..30}; do
          if curl -s http://localhost:5000/api/products > /dev/null; then
            echo "Backend is up";
            break;
          fi
          sleep 1
        done

        # wait for frontend to accept connections
        echo "Waiting for frontend on port 3000..."
        for i in {1..30}; do
          if curl -s http://localhost:3000/ > /dev/null; then
            echo "Frontend is up";
            break;
          fi
          sleep 1
        done

    - name: Build Maven project
      run: mvn clean install -DskipTests

    - name: Run Selenium Tests
      run: |
        # ensure tests know where the frontend is running
        BASE_URL=http://localhost:3000/ mvn test

    - name: Generate Allure report
      run: |
        # generate HTML report from Allure results
        mvn io.qameta.allure:allure-maven:2.12.0:report \
          -Dallure.results.directory=target/allure-results \
          -Dallure.report.directory=allure-report || true

    - name: Upload Allure report artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Deploy Allure report to gh-pages branch (peaceiris)
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report