name: Maven Build & Selenium Tests

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Google Chrome
      run: |
        sudo apt update
        sudo apt install -y google-chrome-stable

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Start backend and frontend servers
      run: |
        # launch both servers in background
        cd backend && npm start &
        cd ../frontend && npm start &
        # wait for backend to accept connections
        echo "Waiting for backend on port 5000..."
        for i in {1..30}; do
          if curl -s http://localhost:5000/api/products > /dev/null; then
            echo "Backend is up";
            break;
          fi
          sleep 1
        done
        # wait for frontend to accept connections
        echo "Waiting for frontend on port 3000..."
        for i in {1..30}; do
          if curl -s http://localhost:3000/ > /dev/null; then
            echo "Frontend is up";
            break;
          fi
          sleep 1
        done

    - name: Build Maven project
      run: mvn clean install -DskipTests

    - name: Run Selenium Tests
      run: |
        # ensure tests know where the frontend is running
        BASE_URL=http://localhost:3000/ mvn test