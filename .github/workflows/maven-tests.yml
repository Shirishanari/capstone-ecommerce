name: Maven Build & Selenium Tests

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Set up JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3️⃣ Install Google Chrome
    - name: Install Google Chrome
      run: |
        sudo apt update
        sudo apt install -y google-chrome-stable wget unzip curl

    # 4️⃣ Install matching ChromeDriver
    - name: Install ChromeDriver
      run: |
        # Get Chrome major version only
        CHROME_MAJOR=$(google-chrome --version | grep -oP '\d+' | head -1)
        echo "Detected Chrome major version: $CHROME_MAJOR"

        # Get latest ChromeDriver for that version
        CHROMEDRIVER_VERSION=$(curl -sS https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_MAJOR)
        echo "Installing ChromeDriver version: $CHROMEDRIVER_VERSION"

        wget -N https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip -P /tmp
        unzip -o /tmp/chromedriver_linux64.zip -d /tmp
        sudo mv -f /tmp/chromedriver /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver
        chromedriver --version

    # 5️⃣ Setup Node.js
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 6️⃣ Install frontend dependencies
    - name: Install frontend dependencies
      run: npm ci

    # 7️⃣ Start frontend app
    - name: Start frontend app
      run: |
        nohup npm start > frontend.log 2>&1 &
        echo "Waiting for frontend to start on port 3000..."
        n=0
        until $(curl --output /dev/null --silent --head --fail http://localhost:3000); do
          n=$((n+1))
          if [ $n -ge 30 ]; then
            echo "Frontend did not start in time!"
            cat frontend.log
            exit 1
          fi
          sleep 2
        done
        echo "Frontend is up!"

    # 8️⃣ Build Maven project without tests
    - name: Build Maven project
      run: mvn clean install -DskipTests

    # 9️⃣ Run Selenium Tests
    - name: Run Selenium Tests
      run: mvn test